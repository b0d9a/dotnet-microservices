services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - microservices

  auth-service:
    build:
      context: ./AuthService
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "5001:8080"
    environment:
      - MONGODB_CONNECTION=mongodb://mongodb:27017
      - JWT_SECRET=SuperSecretKey_ChangeInProd_2024!
      - JWT_ISSUER=kursovaya
      - JWT_AUDIENCE=kursovaya
    depends_on:
      - mongodb
    networks:
      - microservices

  user-service:
    build:
      context: ./UserService
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "5002:8080"
    environment:
      - MONGODB_CONNECTION=mongodb://mongodb:27017
      - JWT_SECRET=SuperSecretKey_ChangeInProd_2024!
      - JWT_ISSUER=kursovaya
      - JWT_AUDIENCE=kursovaya
    depends_on:
      - mongodb
    networks:
      - microservices

  api-gateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: api-gateway
    ports:
      - "5000:8080"
    environment:
      - JWT_SECRET=SuperSecretKey_ChangeInProd_2024!
      - JWT_ISSUER=kursovaya
      - JWT_AUDIENCE=kursovaya
      - AUTH_SERVICE_URL=http://auth-service:8080
      - USER_SERVICE_URL=http://user-service:8080
    depends_on:
      - auth-service
      - user-service
    networks:
      - microservices

volumes:
  mongo_data:

networks:
  microservices:
    driver: bridge
